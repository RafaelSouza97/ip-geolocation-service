# Configurações base
spring:
  application:
    name: ip-geolocation-service

# Informações da API
info:
  app:
    name: IP Geolocation Service
    description: Microserviço REST para identificação de informações geográficas a partir de endereços IP
    version: 1.0.0
    author: Rafael Souza
  api:
    providers:
      primary: ip-api.com
      secondary: ipapi.co
    authentication: JWT Bearer Token
    documentation: /swagger-ui.html

server:
  port: 8080

# Configurações de geolocalização
geolocation:
  providers:
    primary:
      name: ip-api.com
      url: ${GEOLOCATION_PRIMARY_URL:http://ip-api.com/json}
      timeout: ${GEOLOCATION_PRIMARY_TIMEOUT:5s}
    secondary:
      name: ipapi.co
      url: ${GEOLOCATION_SECONDARY_URL:https://ipapi.co}
      timeout: ${GEOLOCATION_SECONDARY_TIMEOUT:5s}
    failover-duration: ${GEOLOCATION_FAILOVER_DURATION:5m}
  cache:
    ttl: ${GEOLOCATION_CACHE_TTL:24h}
    max-size: ${GEOLOCATION_CACHE_MAX_SIZE:10000}
  fallback:
    country-code: ${GEOLOCATION_FALLBACK_COUNTRY_CODE:BR}
    country-name: ${GEOLOCATION_FALLBACK_COUNTRY_NAME:Brazil}

# Segurança JWT
security:
  jwt:
    secret-key: ${JWT_SECRET_KEY:minha-chave-secreta-super-segura-para-jwt-256-bits-minimo}
    expiration: ${JWT_EXPIRATION:86400000}  # 24 horas em milissegundos
  user:
    username: ${SECURITY_USER:admin}
    password: ${SECURITY_PASSWORD:Admin123@}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    info:
      enabled: true
  info:
    env:
      enabled: true

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
