# Configurações base
spring:
  application:
    name: ip-geolocation-service

server:
  port: 8080

# Configurações de geolocalização
geolocation:
  api:
    url: ${GEOLOCATION_API_URL:http://ip-api.com/json}
    timeout: ${GEOLOCATION_API_TIMEOUT:5s}
  cache:
    ttl: ${GEOLOCATION_CACHE_TTL:24h}
    max-size: ${GEOLOCATION_CACHE_MAX_SIZE:10000}
  fallback:
    country-code: ${GEOLOCATION_FALLBACK_COUNTRY_CODE:BR}
    country-name: ${GEOLOCATION_FALLBACK_COUNTRY_NAME:Brazil}

# Segurança JWT
security:
  jwt:
    secret-key: ${JWT_SECRET_KEY:minha-chave-secreta-super-segura-para-jwt-256-bits-minimo}
    expiration: ${JWT_EXPIRATION:86400000}  # 24 horas em milissegundos
  user:
    username: ${SECURITY_USER:admin}
    password: ${SECURITY_PASSWORD:Admin123@}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
