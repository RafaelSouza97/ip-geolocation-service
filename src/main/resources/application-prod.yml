# Configurações para ambiente de produção

logging:
  level:
    com.example.geolocation: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN

# Swagger desabilitado em produção (segurança)
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

# Configurações de segurança
server:
  error:
    include-stacktrace: never
    include-message: never

# JWT via variável de ambiente
jwt:
  secret: ${JWT_SECRET}

# Actuator - expor apenas health em produção
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
